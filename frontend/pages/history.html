<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="bg-transparent text-white p-4">
    <h2 class="text-xl font-bold mb-4">Scan History</h2>

    <div class="flex gap-2 mb-4">
      <button class="px-3 py-1 bg-white/20 rounded-full text-sm active">
        All
      </button>
      <button class="px-3 py-1 bg-white/10 rounded-full text-sm">Safe</button>
      <button class="px-3 py-1 bg-white/10 rounded-full text-sm">
        Suspicious
      </button>
      <button class="px-3 py-1 bg-white/10 rounded-full text-sm">Danger</button>
    </div>

    <div class="space-y-2" id="historyList">
      <div class="bg-white/10 rounded-lg p-3 flex justify-between items-center">
        <div>
          <div class="font-medium">google.com</div>
          <div class="text-xs opacity-70">2024-01-20 14:30</div>
        </div>
        <span class="px-2 py-1 bg-green-500 rounded-full text-xs">Safe</span>
      </div>

      <div class="bg-white/10 rounded-lg p-3 flex justify-between items-center">
        <div>
          <div class="font-medium">suspicious-site.com</div>
          <div class="text-xs opacity-70">2024-01-20 13:15</div>
        </div>
        <span class="px-2 py-1 bg-red-500 rounded-full text-xs">High Risk</span>
      </div>
    </div>
  </body>
  <script>
    window.addEventListener("message", (event) => {
      if (event.data.type === "UPDATE_DATA") {
        const data = event.data.data

        document.getElementById("riskScore").textContent = data.risk_score

        const levelEl = document.getElementById("riskLevel")
        levelEl.textContent = data.risk_level

        levelEl.className = `px-3 py-1 rounded-full text-sm ${
          data.risk_level.toLowerCase() === "high"
            ? "bg-red-500"
            : data.risk_level.toLowerCase() === "medium"
              ? "bg-yellow-500"
              : "bg-green-500"
        }`

        document.getElementById("message").textContent = data.message

        const reasonsList = document.getElementById("reasonsList")
        reasonsList.innerHTML = data.reasons
          .map((r) => `<li>🔴 ${r}</li>`)
          .join("")
      }
    })

    window.parent.postMessage({ type: "PAGE_LOADED", page: "dashboard" }, "*")
  </script>
</html>
